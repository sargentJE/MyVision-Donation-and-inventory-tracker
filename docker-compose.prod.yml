services:
  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
      POSTGRES_DB: ${POSTGRES_DB:-equipment_tracker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myvision}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-myvision}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-equipment_tracker}
      JWT_SECRET: ${JWT_SECRET:?JWT secret is required}
      JWT_EXPIRY: ${JWT_EXPIRY:-60m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?Refresh token secret is required}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-7d}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:?Admin email is required}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?Admin password is required}
      WEB_ORIGIN: https://${DOMAIN:-equipment.sightkick.co.uk}
      API_PORT: "3001"
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-300}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 6 * * *}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://api:3001
      NODE_ENV: production
    expose:
      - "3000"
    labels:
      - traefik.http.services.web.loadbalancer.server.port=3000

  db-backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - db-backups:/backups
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-equipment_tracker}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/equipment_$$(date +%Y-%m-%d_%H%M).sql.gz
          find /backups -name '*.sql.gz' -mtime +7 -delete
          echo "Backup complete: $$(date)"
          sleep 86400
        done
    exclude_from_hc: true

volumes:
  pgdata:
  db-backups:
