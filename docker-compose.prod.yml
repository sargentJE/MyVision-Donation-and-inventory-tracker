services:
  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/api/auth/me 2>&1; [ $$? -ne 4 ]"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://api:3001
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - internal
      - external

  db-backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - db-backups:/backups
    env_file: .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/equipment_$$(date +%Y-%m-%d_%H%M).sql.gz
          find /backups -name '*.sql.gz' -mtime +7 -delete
          echo "Backup complete: $$(date)"
          sleep 86400
        done
    networks:
      - internal

volumes:
  pgdata:
  db-backups:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
